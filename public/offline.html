<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="theme-color" content="#006069">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Offline - Humi</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #006069 0%, #049ba6 100%);
            color: white;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .logo {
            width: 100px;
            height: auto;
            margin: 0 auto 32px;
            opacity: 0.95;
            filter: brightness(0) invert(1);
        }

        .icon-wrap {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 26px;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 15px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        button, .btn {
            background: white;
            color: #006069;
            border: none;
            padding: 14px 36px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
            min-width: 200px;
        }

        button:hover, .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .status {
            margin-top: 32px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #22c55e;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 22px; }
            p { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/icons/icon-192.png" alt="Humi" class="logo" onerror="this.style.display='none'">

        <div class="icon-wrap">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <line x1="12" y1="20" x2="12.01" y2="20"/>
            </svg>
        </div>

        <h1>Anda sedang offline</h1>
        <p>Periksa koneksi internet Anda lalu coba lagi. Beberapa fitur dan data mungkin masih tersedia dari cache lokal.</p>

        <div class="actions">
            <button onclick="window.location.reload()">Coba Lagi</button>
            <a href="/portal" class="btn btn-secondary">Buka Portal</a>
        </div>

        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Tidak ada koneksi internet</span>
        </div>
    </div>

    <script>
        function updateStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (navigator.onLine) {
                dot.classList.add('online');
                text.textContent = 'Koneksi tersambung kembali!';
                setTimeout(() => window.location.reload(), 1000);
            } else {
                dot.classList.remove('online');
                text.textContent = 'Tidak ada koneksi internet';
            }
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();
    </script>
</body>
</html>
